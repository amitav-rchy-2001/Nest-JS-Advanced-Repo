services:
  postgres:
    image: postgres:16
    container_name: backend_template_postgres
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: backend_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: backend_template_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
