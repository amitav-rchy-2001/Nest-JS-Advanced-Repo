services:
  postgres:
    image: postgres:16
    container_name: evaturner_postgres
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: evaturner-backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: evaturner_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
